name: Industry Watcher Pipeline + Deploy

on:
  # Daily at 06:00 UTC (every day)
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger from Actions tab
  workflow_dispatch:
  # Auto-deploy on push to master (no pipeline re-run)
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'

# Required secrets (must be set in GitHub → Settings → Secrets and variables → Actions):
# - OPENAI_API_KEY
# - OPENAI_BASE_URL (optional)
# - VERCEL_TOKEN
# - VERCEL_TEAM_ID
# - VERCEL_PROJECT_ID
# - VERCEL_REPO_ID
# - INGRID_PAT (optional, only needed if you want to commit latest.json back to the repo)

permissions:
  contents: read

jobs:
  # ── Job 1: Full pipeline (scrape + LLM + deploy) ──
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (scrape + LLM brief)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: python scripts/run_pipeline.py

      - name: Commit brief to master (optional archival)
        env:
          COMMIT_TOKEN: ${{ secrets.INGRID_PAT }}
        run: |
          if [ -z "$COMMIT_TOKEN" ]; then
            echo "::warning::INGRID_PAT not set — skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${COMMIT_TOKEN}@github.com/igoingtodevx/industry-watcher.git"
            git add -f web/data/latest.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: daily brief $(date -u +%Y-%m-%d)"
              git push origin HEAD:master
            fi
          fi

      - name: Trigger Vercel deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_REPO_ID: ${{ secrets.VERCEL_REPO_ID }}
        run: |
          echo "Triggering Vercel deploy..."
          DEPLOY=$(curl -sS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"ai-industry-watcher\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"ref\": \"master\",
                \"repoId\": ${VERCEL_REPO_ID}
              }
            }")
          DEPLOY_ID=$(echo "$DEPLOY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))")
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Failed to trigger Vercel deploy"
            exit 1
          fi
          echo "Deployment ID: $DEPLOY_ID"
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -sS \
              "https://api.vercel.com/v13/deployments/${DEPLOY_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState',''))")
            echo "  [${i}0s] state=$STATUS"
            case "$STATUS" in
              READY) echo "✅ Vercel deploy READY"; exit 0 ;;
              ERROR|CANCELED) echo "::error::$STATUS"; exit 1 ;;
            esac
          done
          echo "::error::Deployment timed out"
          exit 1

  # ── Job 2: Fast deploy only (on push) ──
  vercel-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - name: Trigger Vercel deploy (push only)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_REPO_ID: ${{ secrets.VERCEL_REPO_ID }}
        run: |
          echo "Push detected — re-deploying master HEAD to Vercel..."
          DEPLOY=$(curl -sS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"ai-industry-watcher\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"ref\": \"master\",
                \"repoId\": ${VERCEL_REPO_ID}
              }
            }")
          DEPLOY_ID=$(echo "$DEPLOY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))")
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Failed to trigger Vercel deploy"
            exit 1
          fi
          echo "Deployment ID: $DEPLOY_ID"
          for i in $(seq 1 20); do
            sleep 10
            STATUS=$(curl -sS \
              "https://api.vercel.com/v13/deployments/${DEPLOY_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState',''))")
            echo "  [${i}0s] state=$STATUS"
            case "$STATUS" in
              READY) echo "✅ Vercel deploy READY: https://ai-industry-watcher.vercel.app"; exit 0 ;;
              ERROR|CANCELED) echo "::error::$STATUS"; exit 1 ;;
            esac
          done
          echo "::error::Deployment timed out"
          exit 1
