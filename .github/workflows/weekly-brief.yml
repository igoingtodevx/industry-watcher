name: Industry Watcher Pipeline + Deploy

on:
  # Daily at 06:00 UTC (every day)
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger from Actions tab
  workflow_dispatch:
  # Auto-deploy on push to master (no pipeline re-run)
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'

# Required secrets (must be set in GitHub → Settings → Secrets and variables → Actions):
# - OPENAI_API_KEY
# - OPENAI_BASE_URL (optional)
# - VERCEL_TOKEN
# - VERCEL_TEAM_ID
# - VERCEL_PROJECT_ID
# - VERCEL_REPO_ID
# - INGRID_PAT (optional, only needed if you want to commit latest.json back to the repo)

permissions:
  contents: read

jobs:
  # ── Job 1: Full pipeline (scrape + LLM + deploy) ──
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (scrape + LLM brief)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: python scripts/run_pipeline.py

      - name: Commit brief to master (optional archival)
        env:
          COMMIT_TOKEN: ${{ secrets.INGRID_PAT }}
        run: |
          if [ -z "$COMMIT_TOKEN" ]; then
            echo "::warning::INGRID_PAT not set — skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${COMMIT_TOKEN}@github.com/igoingtodevx/industry-watcher.git"
            git add -f web/data/latest.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: daily brief $(date -u +%Y-%m-%d)"
              git push origin HEAD:master
            fi
          fi

      - name: Trigger Vercel deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_REPO_ID: ${{ secrets.VERCEL_REPO_ID }}
        run: |
          echo "::group::Vercel deploy context"
          echo "team_id=$VERCEL_TEAM_ID"
          echo "project_id=$VERCEL_PROJECT_ID"
          echo "repo_id=$VERCEL_REPO_ID  (type=$( [[ $VERCEL_REPO_ID =~ ^[0-9]+$ ]] && echo numeric-GH-id || echo vercel-string-id ))"
          echo "sha=$GITHUB_SHA"
          echo "::endgroup::"

          # Build body — include sha for safety (Vercel accepts it as a hint)
          BODY=$(cat <<JSON
          {
            "name": "ai-industry-watcher",
            "target": "production",
            "gitSource": {
              "type": "github",
              "ref": "master",
              "sha": "${GITHUB_SHA}",
              "repoId": "${VERCEL_REPO_ID}"
            }
          }
          JSON
          )

          echo "Request body:"
          echo "$BODY"

          HTTP_CODE=$(curl -sS -o /tmp/vercel_resp.json -w "%{http_code}" \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$BODY")
          echo "HTTP ${HTTP_CODE}"
          echo "Vercel response (first 800 chars):"
          head -c 800 /tmp/vercel_resp.json
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOY_ID=$(python3 -c "import json; d=json.load(open('/tmp/vercel_resp.json')); print(d.get('id',''))")
          else
            DEPLOY_ID=""
          fi

          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Failed to trigger Vercel deploy (http=${HTTP_CODE})"
            echo "::error::Full Vercel response:"
            cat /tmp/vercel_resp.json
            exit 1
          fi
          echo "Deployment ID: $DEPLOY_ID"
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -sS \
              "https://api.vercel.com/v13/deployments/${DEPLOY_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState',''))")
            echo "  [${i}0s] state=$STATUS"
            case "$STATUS" in
              READY) echo "✅ Vercel deploy READY"; break ;;
              ERROR|CANCELED) echo "::error::$STATUS"; exit 1 ;;
            esac
          done
          if [ "$STATUS" != "READY" ]; then
            echo "::error::Deployment timed out"
            exit 1
          fi

      - name: Smoke-test live site
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # Wait briefly for Vercel CDN to pick up the new file
          sleep 15
          for attempt in 1 2 3 4 5; do
            set +e
            OUTPUT=$(python3 scripts/smoke_test.py 2>&1)
            EXIT=$?
            set -e
            echo "smoke attempt $attempt: exit=$EXIT output=$OUTPUT"
            if [ "$EXIT" -eq 0 ]; then
              echo "✅ Live site fresh (age=${OUTPUT}s)"
              exit 0
            fi
            if [ "$EXIT" -eq 2 ]; then
              # parse/transport error — retry
              sleep 10
              continue
            fi
            # stale — keep going to retry once more (CDN might catch up)
            if [ "$attempt" -lt 5 ]; then
              sleep 10
              continue
            fi
            AGE_OUT="$OUTPUT"
          done
          echo "::error::Live site stale after retries: ${AGE_OUT}"
          cat > /tmp/watchdog-body.md <<EOF
          ## ⚠️ Smoke-test Alert (run $GITHUB_RUN_ID)

          The generate-brief workflow deployed successfully but the live site is
          serving stale data. Diagnostic: ${AGE_OUT}

          - **Run:** https://github.com/igoingtodevx/industry-watcher/actions/runs/$GITHUB_RUN_ID
          - **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Likely causes: Vercel CDN cache miss, SAML token lost scope again,
          or build failure on the Vercel side.
          EOF
          gh issue create \
            --repo igoingtodevx/industry-watcher \
            --title "⚠️ Smoke-test alert: live data stale (run $GITHUB_RUN_ID)" \
            --body-file /tmp/watchdog-body.md \
            --label "watchdog-alert" || true
          exit 1

  # ── Job 2: Fast deploy only (on push) ──
  vercel-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Vercel deploy (push only)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_REPO_ID: ${{ secrets.VERCEL_REPO_ID }}
        run: |
          echo "Push detected — re-deploying master HEAD to Vercel..."
          BODY=$(cat <<JSON
          {
            "name": "ai-industry-watcher",
            "target": "production",
            "gitSource": {
              "type": "github",
              "ref": "master",
              "sha": "${GITHUB_SHA}",
              "repoId": "${VERCEL_REPO_ID}"
            }
          }
          JSON
          )

          HTTP_CODE=$(curl -sS -o /tmp/vercel_resp.json -w "%{http_code}" \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$BODY")
          echo "HTTP ${HTTP_CODE}"
          echo "Vercel response (first 800 chars):"
          head -c 800 /tmp/vercel_resp.json
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOY_ID=$(python3 -c "import json; d=json.load(open('/tmp/vercel_resp.json')); print(d.get('id',''))")
          else
            DEPLOY_ID=""
          fi

          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Failed to trigger Vercel deploy (http=${HTTP_CODE})"
            echo "::error::Full Vercel response:"
            cat /tmp/vercel_resp.json
            exit 1
          fi
          echo "Deployment ID: $DEPLOY_ID"
          for i in $(seq 1 20); do
            sleep 10
            STATUS=$(curl -sS \
              "https://api.vercel.com/v13/deployments/${DEPLOY_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readyState',''))")
            echo "  [${i}0s] state=$STATUS"
            case "$STATUS" in
              READY) echo "✅ Vercel deploy READY: https://ai-industry-watcher.vercel.app"; break ;;
              ERROR|CANCELED) echo "::error::$STATUS"; exit 1 ;;
            esac
          done
          if [ "$STATUS" != "READY" ]; then
            echo "::error::Deployment timed out"
            exit 1
          fi

      - name: Smoke-test live site (push)
        run: |
          sleep 15
          for attempt in 1 2 3 4 5; do
            set +e
            OUTPUT=$(python3 scripts/smoke_test.py 2>&1)
            EXIT=$?
            set -e
            echo "smoke attempt $attempt: exit=$EXIT output=$OUTPUT"
            if [ "$EXIT" -eq 0 ]; then
              echo "✅ Live site fresh (age=${OUTPUT}s)"
              exit 0
            fi
            if [ "$EXIT" -eq 2 ] && [ "$attempt" -lt 5 ]; then
              sleep 10
              continue
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep 10
              continue
            fi
            AGE_OUT="$OUTPUT"
          done
          echo "::error::Live site stale after push-deploy retries: ${AGE_OUT}"
          cat > /tmp/watchdog-body.md <<EOF
          ## ⚠️ Smoke-test alert after push deploy (run $GITHUB_RUN_ID)

          The push-deploy workflow completed but the live site is stale. Diagnostic: ${AGE_OUT}

          - **Run:** https://github.com/igoingtodevx/industry-watcher/actions/runs/$GITHUB_RUN_ID
          - **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Likely: Vercel CDN cache miss, SAML token lost scope, or build failure.
          EOF
          gh issue create \
            --repo igoingtodevx/industry-watcher \
            --title "⚠️ Smoke-test alert after push (run $GITHUB_RUN_ID)" \
            --body-file /tmp/watchdog-body.md \
            --label "watchdog-alert" || true
          exit 1
